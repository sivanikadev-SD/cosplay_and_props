<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-label="Neon Prop Logo">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BC13FE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon Mark (Centered Vertically in 60px) -->
  <g transform="translate(0, 5)">
    <!-- Outer hexagon background -->
    <polygon points="36,6 56,17 56,39 36,50 16,39 16,17" fill="none" stroke="url(#neonGrad)" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
    <!-- Inner sword blade diagonal slash -->
    <line x1="24" y1="40" x2="48" y2="16" stroke="url(#neonGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="26" y1="44" x2="50" y2="20" stroke="url(#neonGrad)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <!-- N letter path -->
    <path d="M22 40 L22 18 L34 36 L34 18" fill="none" stroke="url(#neonGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Short sparkle marks -->  
    <circle cx="36" cy="8" r="1.5" fill="#00F2FF" opacity="0.8" filter="url(#glow)"/>
    <circle cx="55" cy="28" r="1" fill="#BC13FE" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="70" y="42" font-family="'Outfit', 'Rajdhani', sans-serif" font-weight="900" font-size="22" letter-spacing="3" fill="url(#textGrad)" filter="url(#glow)">NEON</text>
  <text x="145" y="42" font-family="'Outfit', 'Rajdhani', sans-serif" font-weight="900" font-size="22" letter-spacing="3" fill="url(#textGrad)">PROP</text>
</svg>
