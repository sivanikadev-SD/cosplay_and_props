<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Neon Prop Studio</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--nav-height) + 60px) 16px 60px;
            background: radial-gradient(ellipse 80% 50% at 50% 20%, rgba(139, 92, 246, .07), transparent);
        }

        [data-theme=dark] .auth-wrapper {
            background: radial-gradient(ellipse 80% 50% at 50% 20%, rgba(188, 19, 254, .04), transparent);
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            border-radius: var(--border-radius-xl);
            padding: 3rem 2.5rem;
        }

        .divider-or {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: .85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 1.75rem 0;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .btn-social {
            width: 100%;
            padding: 13px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            background: transparent;
            color: var(--text-main);
            font-weight: 600;
            font-size: .9rem;
            transition: var(--transition-fast);
        }

        .btn-social:hover {
            border-color: var(--primary-neon);
            color: var(--primary-neon);
            background: rgba(0, 102, 255, .05);
        }

        .pwd-strength {
            height: 4px;
            border-radius: 4px;
            background: var(--bg-alt);
            overflow: hidden;
            margin-top: 6px;
        }

        .pwd-bar {
            height: 100%;
            width: 0;
            border-radius: 4px;
            transition: width .35s, background .35s;
        }

        @media(max-width:575.98px) {
            .auth-wrapper {
                padding: calc(var(--nav-height) + 60px) 16px 40px;
                align-items: flex-start;
            }
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: var(--border-radius-lg);
            }
        }
    </style>
</head>

<body>
    <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top"><i
            class="bi bi-chevron-up"></i></button>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand o-font fw-bold" href="../index.html">
                <img src="../assets/images/logo.svg" alt="Neon Prop Studio" height="60" style="max-width:280px;">
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <button id="theme-toggle" class="btn btn-theme-toggle" aria-label="Toggle Theme"><i
                        class="bi bi-sun-fill"></i></button>
                <button id="rtl-toggle" class="btn btn-link text-neon fw-bold px-1"
                    style="font-size:.8rem;letter-spacing:1px; text-decoration: none;" aria-label="Toggle RTL">RTL</button>
            </div>
        </div>
    </nav>

    <main class="auth-wrapper" id="main-content">
        <div class="auth-card glass-card reveal">
            <!-- Logo -->
            <div class="text-center mb-5">
                <h1 class="text-muted mt-1" style="font-size:1.5rem;">Join the forge, Artisan</h1>
            </div>

            <h1 class="fw-bold mb-4 text-center" style="font-family:'Outfit',sans-serif;font-size:1.5rem;">Create Your
                Studio Account</h1>

            <!-- Social -->
             <div style="display: flex; gap: 1rem; justify-content: center;">
            <button class="btn-social d-flex align-items-center justify-content-center gap-3">
                <i class="bi bi-google"></i>
            </button>
            <button class="btn-social d-flex align-items-center justify-content-center gap-3">
                <i class="bi bi-discord"></i>
            </button>
            <button class="btn-social d-flex align-items-center justify-content-center gap-3">
                <i class="bi bi-apple"></i>
            </button>
        </div>

            <div class="divider-or">or</div>

            <!-- Signup Form -->
            <form id="signupForm" class="needs-validation" novalidate>
                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label fw-bold small text-muted"
                            style="text-transform:uppercase;letter-spacing:1px;">First Name</label>
                        <input type="text" class="form-control form-control-premium" id="signupFirst"
                            placeholder="Kenji" required autocomplete="given-name">
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-bold small text-muted"
                            style="text-transform:uppercase;letter-spacing:1px;">Last Name</label>
                        <input type="text" class="form-control form-control-premium" id="signupLast" placeholder="Mori"
                            required autocomplete="family-name">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold small text-muted"
                            style="text-transform:uppercase;letter-spacing:1px;">Email</label>
                        <input type="email" class="form-control form-control-premium" id="signupEmail"
                            placeholder="forge@email.com" required autocomplete="email">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold small text-muted"
                            style="text-transform:uppercase;letter-spacing:1px;">Cosplay Handle (optional)</label>
                        <input type="text" class="form-control form-control-premium" id="signupHandle"
                            placeholder="e.g. ZeroKosplay">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold small text-muted"
                            style="text-transform:uppercase;letter-spacing:1px;">Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control form-control-premium pe-5" id="signupPassword"
                                placeholder="Min. 8 characters" minlength="8" required autocomplete="new-password">
                            <span class="position-absolute top-50 end-0 translate-middle-y me-3 toggle-password" data-target="signupPassword" style="cursor: pointer; color: var(--text-muted); z-index: 10;">
                                <i class="bi bi-eye toggle-password-icon"></i>
                            </span>
                        </div>
                        <div class="pwd-strength mt-2">
                            <div class="pwd-bar" id="pwdBar"></div>
                        </div>
                        <p class="text-muted mt-1 mb-0" style="font-size:.78rem;" id="pwdStrengthLabel">Enter a password
                        </p>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold small text-muted"
                            style="text-transform:uppercase;letter-spacing:1px;">Confirm Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control form-control-premium pe-5" id="signupConfirm"
                                placeholder="Repeat password" required autocomplete="new-password">
                            <span class="position-absolute top-50 end-0 translate-middle-y me-3 toggle-password" data-target="signupConfirm" style="cursor: pointer; color: var(--text-muted); z-index: 10;">
                                <i class="bi bi-eye toggle-password-icon"></i>
                            </span>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsCheck" required>
                            <label class="form-check-label text-muted" style="font-size:.88rem;cursor:pointer;"
                                for="termsCheck">
                                I agree to the <a href="#" style="color:var(--primary-neon);">Terms of Service</a> and
                                <a href="#" style="color:var(--primary-neon);">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                    <div class="col-12 pt-2">
                        <button type="submit" class="btn btn-neon w-100 py-3 mb-4" id="signupBtn">
                            <i class="bi bi-rocket-takeoff me-2"></i>Join the Studio
                        </button>
                        <p class="text-center text-muted mb-0" style="font-size:.88rem;">
                            Already a member? <a href="login.html"
                                style="color:var(--primary-neon);font-weight:700;">Sign In →</a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="authToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive"
            aria-atomic="true" style="background:var(--grad-primary);">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">Account created!</div><button type="button"
                    class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        // Password Strength Indicator
        const pwdInput = document.getElementById('signupPassword');
        const pwdBar = document.getElementById('pwdBar');
        const pwdLabel = document.getElementById('pwdStrengthLabel');
        if (pwdInput) {
            pwdInput.addEventListener('input', () => {
                const v = pwdInput.value;
                let score = 0;
                if (v.length >= 8) score++;
                if (/[A-Z]/.test(v)) score++;
                if (/[0-9]/.test(v)) score++;
                if (/[^A-Za-z0-9]/.test(v)) score++;
                const levels = [
                    { pct: '25%', color: '#ef4444', label: 'Weak' },
                    { pct: '50%', color: '#f97316', label: 'Fair' },
                    { pct: '75%', color: '#eab308', label: 'Good' },
                    { pct: '100%', color: '#22c55e', label: 'Strong' },
                ];
                if (v.length === 0) { pwdBar.style.width = '0%'; pwdLabel.textContent = 'Enter a password'; return; }
                const idx = Math.max(0, score - 1);
                pwdBar.style.width = levels[idx].pct;
                pwdBar.style.background = levels[idx].color;
                pwdLabel.textContent = 'Strength: ' + levels[idx].label;
            });
        }
    </script>
</body>

</html>
